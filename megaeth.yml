x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: "3"
      tag: '{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}'

services:
  init:
    restart: "no"
    build:
      context: ./init
      dockerfile: Dockerfile
    image: init:megaeth
    pull_policy: never
    environment:
      NETWORk: "${NETWORk}"
      MEGARETH_BOOTSTRAP_POLICY: "${MEGARETH_BOOTSTRAP_POLICY}"
      MEGARETH_ROLLUP_SEQUENCER: "${MEGARETH_ROLLUP_SEQUENCER}"
    volumes:
      - data:/data
      - ./private:/private
      - /etc/localtime:/etc/localtime:ro
    <<: *logging

  megaeth-node:
    depends_on:
      init:
        condition: service_completed_successfully
    image: ubuntu:24.04
    restart: unless-stopped
    env_file:
      - ./private/environment.sh
    ports:
      - "0.0.0.0:9547:9547"
      - "0.0.0.0:9548:9548"
      - "0.0.0.0:8002:8002"
      - "0.0.0.0:30305:30305/tcp"
      - "0.0.0.0:30305:30305/udp"
    volumes:
      - type: volume
        source: data
        target: /opt/megaeth/bin/rpc-node
        read_only: true
        volume:
          subpath: data/snapshot/megaeth-rpc-v2.0.18/rpc-node-v2.0.18

      - type: volume
        source: data
        target: /opt/megaeth/bin/rpc-node:ro
        read_only: true
        volume:
          subpath: data/snapshot/megaeth-rpc-v2.0.18/mainnet/genesis.json

      - type: volume
        source: data
        target: /opt/megaeth/rpc-node
        read_only: true
        volume:
          subpath: data/node
    command: /opt/megaeth/bin/rpc-node node
